<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Plata's Coffee</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">PLATA'S COFFEE</a>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="productos.html">Tienda</a></li>
                    <li><a href="carrito.html">Carrito</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 style="text-align: center; margin-bottom: 40px;">Finalizar Compra</h1>

        <section class="animate-on-scroll">
            <h3>Resumen del Carrito</h3>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Molienda</th>
                        <th>Cantidad</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Etiopía Yirgacheffe</td>
                        <td>Filtro / V60</td>
                        <td>1</td>
                        <td>18.50€</td>
                    </tr>
                    <tr>
                        <td colspan="3" style="text-align: right; font-weight: 700;">Subtotal</td>
                        <td style="font-weight: 700;">18.50€</td>
                    </tr>
                    <tr>
                        <td colspan="3" style="text-align: right; font-weight: 700;">Envío</td>
                        <td style="font-weight: 700;">4.95€</td>
                    </tr>
                    <tr>
                        <td colspan="3" style="text-align: right; font-size: 1.2rem; font-weight: 700; color: var(--color-primary);">Total</td>
                        <td style="font-size: 1.2rem; font-weight: 700; color: var(--color-primary);">23.45€</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="animate-on-scroll">
            <form action="#">
                <fieldset>
                    <legend>Información de Envío</legend>
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="juan@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="direccion">Dirección de Entrega</label>
                        <input type="text" id="direccion" name="direccion" placeholder="Calle Falsa 123, 2ºB" required>
                    </div>
                    <div class="form-group">
                        <label for="pais">País</label>
                        <select id="pais" name="pais" required>
                            <option value="es">España</option>
                            <option value="pt">Portugal</option>
                            <option value="fr">Francia</option>
                            <option value="it">Italia</option>
                        </select>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Método de Pago</legend>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="pago" value="tarjeta" checked> Tarjeta de Crédito
                        </label>
                        <label>
                            <input type="radio" name="pago" value="paypal"> PayPal
                        </label>
                        <label>
                            <input type="radio" name="pago" value="transferencia"> Transferencia
                        </label>
                    </div>
                </fieldset>

                <button type="submit" class="btn" style="width: 100%; font-size: 1rem; padding: 20px;">Pagar Ahora</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <p>Hecho con ❤️ por <a href="https://github.com/Tatuck">Tatuck</a></p>
        </div>
    </footer>
</body>
</html>
