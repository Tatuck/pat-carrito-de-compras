<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Plata's Coffee</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">PLATA'S COFFEE</a>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="productos.html">Tienda</a></li>
                    <li><a href="carrito.html">Carrito</a></li>
                </ul>
            </nav>
            <button id="btn-login" class="btn" style="padding:8px 18px;font-size:.85rem;">Login</button>
        </div>
    </header>

    <main class="container">
        <div class="detalle-container animate-on-scroll">
            <div class="detalle-imagen">
                <img id="prod-imagen" src="" alt="">
            </div>
            <div class="detalle-info">
                <h1 id="prod-nombre"></h1>
                <p id="prod-precio" class="precio"></p>
                <p id="prod-descripcion" class="descripcion"></p>

                <h3>Ficha Técnica</h3>
                <table>
                    <tr><th>Origen</th>  <td id="prod-origen"></td></tr>
                    <tr><th>Altitud</th> <td id="prod-altitud"></td></tr>
                    <tr><th>Proceso</th> <td id="prod-proceso"></td></tr>
                    <tr><th>Tueste</th>  <td id="prod-tueste"></td></tr>
                </table>

                <form id="form-carrito">
                    <div class="form-group">
                        <label for="molienda">Tipo de Molienda</label>
                        <select id="molienda" name="molienda" required>
                            <option value="grano">En Grano</option>
                            <option value="espresso">Espresso</option>
                            <option value="filtro">Filtro / V60</option>
                            <option value="prensa">Prensa Francesa</option>
                            <option value="italiana">Moka / Italiana</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cantidad">Cantidad (bolsas de 250g)</label>
                        <input type="number" id="cantidad" name="cantidad" value="1" min="1" max="10" required>
                    </div>
                    <button type="submit" class="btn">Añadir al Carrito</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>Hecho con ❤️ por <a href="https://github.com/Tatuck">Tatuck</a></p>
        </div>
    </footer>

    <script src="./js/catalogo.js"></script>
    <script src="./js/producto-detalle.js"></script>
</body>
</html>
